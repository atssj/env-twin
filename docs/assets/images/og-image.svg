<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Decorative gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#238636;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#238636;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad1)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#238636"/>

  <!-- Main content group -->
  <g transform="translate(100, 100)">
    <!-- Logo/Icon -->
    <g transform="translate(0, 20)">
      <!-- Terminal window -->
      <rect x="0" y="0" width="120" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
      <!-- Window controls -->
      <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
      <circle cx="38" cy="20" r="6" fill="#ffbd2e"/>
      <circle cx="56" cy="20" r="6" fill="#27ca40"/>
      <!-- Code lines -->
      <rect x="15" y="45" width="60" height="6" rx="2" fill="#238636" opacity="0.8"/>
      <rect x="15" y="58" width="45" height="6" rx="2" fill="#58a6ff" opacity="0.6"/>
      <rect x="15" y="71" width="75" height="6" rx="2" fill="#8b949e" opacity="0.5"/>
      <!-- Sync arrows -->
      <g transform="translate(88, 55)">
        <path d="M 0 5 L 8 0 L 8 3 L 18 3 L 18 7 L 8 7 L 8 10 Z" fill="#238636"/>
        <path d="M 22 15 L 14 20 L 14 17 L 4 17 L 4 13 L 14 13 L 14 10 Z" fill="#58a6ff"/>
      </g>
    </g>

    <!-- Title -->
    <text x="150" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" fill="#c9d1d9">env-twin</text>

    <!-- Tagline -->
    <text x="0" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="400" fill="#8b949e">Synchronize your .env files effortlessly</text>

    <!-- Feature pills -->
    <g transform="translate(0, 220)">
      <rect x="0" y="0" width="140" height="40" rx="20" fill="#238636" opacity="0.2"/>
      <text x="70" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#3fb950" text-anchor="middle">Zero Dependencies</text>

      <rect x="160" y="0" width="140" height="40" rx="20" fill="#58a6ff" opacity="0.2"/>
      <text x="230" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#58a6ff" text-anchor="middle">Cross-Platform</text>

      <rect x="320" y="0" width="140" height="40" rx="20" fill="#a371f7" opacity="0.2"/>
      <text x="390" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#a371f7" text-anchor="middle">Smart Backups</text>
    </g>

    <!-- NPM badge -->
    <g transform="translate(0, 300)">
      <rect x="0" y="0" width="320" height="50" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
      <text x="20" y="32" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" fill="#c9d1d9">npm install --save-dev env-twin</text>
    </g>
  </g>

  <!-- Bottom section -->
  <text x="600" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#6e7681" text-anchor="middle">github.com/atssj/env-twin</text>
</svg>
